<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>📅 宝宝纪念日</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宝宝纪念日">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ffd1e0'/><text y='.9em' font-size='70' text-anchor='middle' x='50'>📅</text></svg>">
  <link rel="manifest" id="pwaManifest">
  <meta name="theme-color" content="#fff5f9">
  <style>
    :root{--bg:#fff5f9;--card:#fff;--pink:#ffd1e0;--rose:#f9a8c4;--shadow:0 6px 22px rgba(210,180,190,0.25);--radius:26px;--font:'PingFang SC','Microsoft YaHei',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);font-family:var(--font);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:16px;color:#4a3a42;transition:background 0.6s;position:relative;overflow-x:hidden}
    .photo-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background-size:cover;background-position:center;background-repeat:no-repeat;display:none}
    .photo-bg.active{display:block}
    .photo-bg.blur{filter:blur(8px)}
    .app-container{width:100%;max-width:480px;background:rgba(255,248,250,0);backdrop-filter:none;border-radius:38px;box-shadow:0 20px 45px rgba(180,130,150,0.3),inset 0 1px 10px rgba(255,255,255,0.7);padding:18px 16px;border:2px solid rgba(255,220,230,0.6);position:relative;z-index:1;min-height:calc(100vh - 32px);display:flex;flex-direction:column}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0}
    .title{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#d47b8c,#b578a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-btns button{background:rgba(255,255,255,0.85);border:none;padding:8px 14px;border-radius:30px;font-weight:600;color:#b17a8a;margin-left:6px;cursor:pointer;font-size:0.85rem;box-shadow:0 2px 8px rgba(180,150,160,0.1);backdrop-filter:blur(4px)}
    .card{background:rgba(255,255,255,0.85);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:0 3px 10px rgba(180,150,160,0.15);border:2px solid #fbdde5;position:relative;backdrop-filter:blur(4px)}
    .page{display:none;flex:1;flex-direction:column}
    .page.active{display:flex}
    .bro-area{text-align:center;position:relative;padding:8px 0;flex-shrink:0}
    .bro-emoji{font-size:4rem;display:inline-block;cursor:pointer;transition:transform 0.2s;user-select:none;position:relative;z-index:3}
    .bro-emoji:active{transform:scale(1.2)}
    .heart-particle{position:absolute;font-size:1.5rem;animation:floatUp 1.5s ease-out forwards;pointer-events:none;z-index:10}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.8)}}
    .click-particle{position:fixed;pointer-events:none;z-index:999;animation:clickBurst 0.8s ease-out forwards}
    @keyframes clickBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
    .ripple{position:fixed;pointer-events:none;z-index:999;border-radius:50%;animation:rippleOut 1s ease-out forwards;border:2px solid rgba(255,255,255,0.6)}
    @keyframes rippleOut{0%{width:0;height:0;opacity:1}100%{width:120px;height:120px;opacity:0;margin-left:-60px;margin-top:-60px}}
    .category-filter{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none;-ms-overflow-style:none;flex-shrink:0}
    .category-filter::-webkit-scrollbar{display:none}
    .filter-tag{white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:0.78rem;font-weight:600;cursor:pointer;background:rgba(255,255,255,0.85);color:#b17a8a;border:1.5px solid #f0c8d8;transition:0.2s;flex-shrink:0;backdrop-filter:blur(4px)}
    .filter-tag.active{background:#f9a8c4;color:#fff;border-color:#f9a8c4}
    .search-input{width:100%;padding:8px 14px;border-radius:20px;border:1.5px solid #f0c8d8;font-size:0.8rem;background:rgba(255,255,255,0.85);margin-bottom:8px;flex-shrink:0;backdrop-filter:blur(4px)}
    .event-card{background:rgba(255,255,255,0.85);border-radius:20px;padding:14px;margin-bottom:10px;box-shadow:0 3px 10px rgba(180,150,160,0.12);border-left:5px solid #f9a8c4;cursor:pointer;display:flex;align-items:center;gap:12px;transition:0.2s;flex-shrink:0;backdrop-filter:blur(4px)}
    .event-card:active{transform:scale(0.97)}
    .event-card.near{border-left-color:#ff6b7a;background:rgba(255,245,247,0.9)}
    .event-icon{font-size:2rem;min-width:48px;text-align:center}
    .event-info{flex:1}
    .event-name{font-weight:700;font-size:1rem}
    .event-date{font-size:0.75rem;color:#b17a8a}
    .event-days{font-weight:700;font-size:1.1rem;text-align:right;min-width:60px}
    .event-days.past{color:#b17a8a}
    .event-days.future{color:#d47b8c}
    .event-list-wrapper{flex:1;overflow-y:auto;margin-bottom:10px}
    .detail-photo-card{position:relative;border-radius:var(--radius);overflow:hidden;min-height:280px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:var(--shadow);margin-bottom:14px;background-size:cover;background-position:center;background-repeat:no-repeat;flex-shrink:0}
    .detail-photo-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.10);z-index:1}
    .detail-content{position:relative;z-index:2;text-align:center;padding:20px}
    .detail-number{font-size:5rem;font-weight:800;text-shadow:0 4px 20px rgba(0,0,0,0.3);line-height:1}
    .detail-label{font-size:1.2rem;font-weight:600;margin:6px 0;text-shadow:0 2px 8px rgba(0,0,0,0.3)}
    .detail-date-text{font-size:0.9rem;opacity:0.9;text-shadow:0 1px 4px rgba(0,0,0,0.3)}
    .bro-bubble{background:rgba(255,255,255,0.85);border-radius:22px;padding:14px;display:flex;gap:10px;align-items:center;border:1.5px solid #fad6e5;flex-shrink:0;backdrop-filter:blur(4px)}
    .add-btn-fixed{position:fixed;bottom:16px;right:30px;width:56px;height:56px;border-radius:50%;background:#f9a8c4;color:#fff;font-size:2rem;border:none;box-shadow:0 6px 20px rgba(200,120,150,0.4);cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center}
    .modal-sheet{background:#fffef9;border-radius:28px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
    .modal-sheet h3{margin-bottom:12px;color:#4a3a42;text-align:center}
    .modal-sheet input,.modal-sheet select{margin:6px 0;width:100%;padding:10px;border-radius:16px;border:1.5px solid #f0c8d8;font-size:0.9rem;background:#fffbfc}
    .modal-sheet button{margin:6px 4px;background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:10px 18px;border-radius:20px;cursor:pointer;font-size:0.9rem}
    .modal-sheet .close-btn{background:#ddd;color:#555}
    .effect-option{display:inline-block;padding:8px 12px;margin:4px;border-radius:20px;cursor:pointer;border:2px solid transparent;font-size:0.85rem;background:#fff;transition:0.2s}
    .effect-option.selected{border-color:#f9a8c4;background:#fff0f5}
    .back-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:0 8px;color:#b17a8a}
    .hidden{display:none!important}
    .empty-state{padding:40px 20px;text-align:center;color:#b17a8a;flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column}
    .tag{display:inline-block;padding:4px 10px;border-radius:12px;font-size:0.7rem;font-weight:700;margin-right:4px}
    .tag.love{background:#ffe0e8;color:#d4687c}
    .tag.birthday{background:#fff0e0;color:#e8945c}
    .tag.holiday{background:#fffde0;color:#d4a017}
    .tag.life{background:#f5f0e8;color:#8b7355}
    .tag.study{background:#e8f0f8;color:#5a7d9a}
    .tag.custom{background:#f0e6fa;color:#8b6b9a}
    textarea{width:100%;min-height:150px;padding:12px;border-radius:16px;border:1.5px solid #f0c8d8;font-size:0.9rem;background:rgba(255,255,255,0.85);font-family:var(--font);resize:vertical;backdrop-filter:blur(4px)}
    .setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed #f3d8e2}
    .setting-label{font-weight:600;font-size:0.9rem}
    .color-dot{display:inline-block;width:28px;height:28px;border-radius:50%;margin:3px;cursor:pointer;border:3px solid transparent;transition:0.2s}
    .color-dot.selected{border-color:#d47b8c;transform:scale(1.2)}
    .pin-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:0 4px;opacity:0.5;transition:0.2s}
    .pin-btn.pinned{opacity:1}
    .backup-btn{background:rgba(255,255,255,0.85);border:1.5px solid #f0c8d8;padding:8px 14px;border-radius:20px;font-size:0.8rem;cursor:pointer;margin-top:8px;width:100%;backdrop-filter:blur(4px)}
    .skin-option{display:inline-block;padding:6px 12px;margin:3px;border-radius:16px;cursor:pointer;border:1.5px solid #f0c8d8;background:#fff;font-size:0.75rem;font-weight:600;transition:0.2s}
    .skin-option.selected{border-color:#d47b8c;background:#fff0f5}
  </style>
</head>
<body id="mainBody">
<div class="photo-bg" id="photoBg"></div>
<div class="app-container" id="app">
  <div class="page active" id="page-home">

<script>
(function(){
  const STORAGE_KEY = 'countdown_v10';
  let appData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if(!appData.events) appData.events = [];
  if(!appData.bgPhoto) appData.bgPhoto = null;
  if(!appData.photoMode) appData.photoMode = 'clear';
  if(!appData.clickEffect) appData.clickEffect = 'hearts';
  if(!appData.skin) appData.skin = 'default';
  let today = new Date().toISOString().split('T')[0];
  let currentEventId = null;
  let currentFilter = 'all';
  let searchQuery = '';

  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

  // ========== 农历转换模块 ==========
  const LUNAR_MONTHS = ['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];
  const LUNAR_DAYS = ['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];

  const LUNAR_DATA = {
    2024: { spring: '2024-02-10', months: [30,29,30,29,30,29,30,29,30,29,30,29] },
    2025: { spring: '2025-01-29', months: [30,29,30,29,29,30,29,30,29,30,29,30] },
    2026: { spring: '2026-02-17', months: [30,29,30,29,30,29,30,29,30,29,30,29] },
    2027: { spring: '2027-02-06', months: [30,29,30,29,30,29,30,29,30,29,30,29] },
    2028: { spring: '2028-01-26', months: [30,29,30,29,30,29,30,29,30,29,30,29] },
    2029: { spring: '2029-02-13', months: [30,29,30,29,30,29,30,29,30,29,30,29] },
    2030: { spring: '2030-02-03', months: [30,29,30,29,30,29,30,29,30,29,30,29] }
  };

  function getLunarDayOffset(lunarYear, lunarMonth, lunarDay) {
    const data = LUNAR_DATA[lunarYear];
    if (!data) { return (lunarMonth - 1) * 30 + (lunarDay - 1); }
    let offset = 0;
    for (let m = 0; m < lunarMonth - 1; m++) { offset += data.months[m]; }
    offset += lunarDay - 1;
    return offset;
  }

  function lunarToSolar(lunarYear, lunarMonth, lunarDay) {
    const data = LUNAR_DATA[lunarYear];
    if (!data) {
      const approxSpring = `${lunarYear}-02-01`;
      const offset = (lunarMonth - 1) * 30 + (lunarDay - 1);
      const d = new Date(approxSpring + 'T00:00:00');
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    }
    const springDate = new Date(data.spring + 'T00:00:00');
    const offset = getLunarDayOffset(lunarYear, lunarMonth, lunarDay);
    const result = new Date(springDate.getTime() + offset * 86400000);
    return result.toISOString().split('T')[0];
  }

  function solarToLunar(solarDate) {
    const d = new Date(solarDate + 'T00:00:00');
    const year = d.getFullYear();
    let lunarYear = year;
    for (let y = year; y >= 2024; y--) {
      const data = LUNAR_DATA[y];
      if (data && new Date(data.spring + 'T00:00:00') <= d) { lunarYear = y; break; }
    }
    const data = LUNAR_DATA[lunarYear];
    if (!data) {
      return `${lunarYear}年${LUNAR_MONTHS[d.getMonth()]}${LUNAR_DAYS[Math.min(d.getDate() - 1, 29)]}`;
    }
    const springDate = new Date(data.spring + 'T00:00:00');
    const diffDays = Math.floor((d - springDate) / 86400000);
    if (diffDays < 0) {
      const prevData = LUNAR_DATA[lunarYear - 1];
      if (!prevData) {
        return `${lunarYear - 1}年${LUNAR_MONTHS[11]}${LUNAR_DAYS[Math.min(d.getDate() - 1, 29)]}`;
      }
      const prevSpring = new Date(prevData.spring + 'T00:00:00');
      const prevDiff = Math.floor((d - prevSpring) / 86400000);
      let remaining = prevDiff;
      for (let m = 0; m < prevData.months.length; m++) {
        if (remaining < prevData.months[m]) {
          return `${lunarYear - 1}年${LUNAR_MONTHS[m]}${LUNAR_DAYS[remaining]}`;
        }
        remaining -= prevData.months[m];
      }
      return `${lunarYear - 1}年腊月${LUNAR_DAYS[Math.min(prevDiff, 29)]}`;
    }
    let remaining = diffDays;
    for (let m = 0; m < data.months.length; m++) {
      if (remaining < data.months[m]) {
        return `${lunarYear}年${LUNAR_MONTHS[m]}${LUNAR_DAYS[remaining]}`;
      }
      remaining -= data.months[m];
    }
    return `${lunarYear}年腊月${LUNAR_DAYS[Math.min(diffDays, 29)]}`;
  }

  async function getLunarDate(solarDate) {
    try {
      const response = await fetch(`https://api.anxintao.com/api/nongli?date=${solarDate}`);
      const data = await response.json();
      if (data && data.code === 200 && data.data) {
        const lunar = data.data;
        const monthName = LUNAR_MONTHS[parseInt(lunar.lunarMonth) - 1] || lunar.lunarMonth + '月';
        const dayName = LUNAR_DAYS[parseInt(lunar.lunarDay) - 1] || lunar.lunarDay;
        return `${lunar.lunarYear}年${monthName}${dayName}`;
      }
    } catch (e) {}
    return solarToLunar(solarDate);
  }

  async function getSolarFromLunar(lunarYear, lunarMonth, lunarDay) {
    try {
      const response = await fetch(`https://api.anxintao.com/api/nongli?year=${lunarYear}&month=${String(lunarMonth).padStart(2,'0')}&day=${String(lunarDay).padStart(2,'0')}&type=lunar`);
      const data = await response.json();
      if (data && data.code === 200 && data.data && data.data.solarDate) {
        return data.data.solarDate;
      }
    } catch (e) {}
    return lunarToSolar(lunarYear, lunarMonth, lunarDay);
  }

  function renderDiary(){const e=appData.events.find(ev=>ev.id===currentEventId);if(!e)return;document.getElementById('diaryContent').value=e.diary||'';const content=e.diary||'';const mood=detectMood(content);if(mood&&broQuotes[mood]){document.getElementById('diaryBroText').textContent=randomQuote(mood);}else if(!content){document.getElementById('diaryBroText').textContent=randomQuote('diary');}else if(content.length<20){document.getElementById('diaryBroText').textContent='再写一点吧，哥哥想看更多~';}else{document.getElementById('diaryBroText').textContent=randomQuote('diary');}const page=document.getElementById('page-diary');page.style.backgroundImage='';page.style.backgroundSize='';page.style.backdropFilter='';}
  function renderMilestone(){const e=appData.events.find(ev=>ev.id===currentEventId);if(!e)return;const start=new Date(e.date+'T00:00:00');const todayDate=new Date();todayDate.setHours(0,0,0,0);const totalDays=Math.floor((todayDate-start)/86400000);const milestones=[];for(let d=100;d<=totalDays+365;d+=100){const target=new Date(start.getTime()+d*86400000);const remaining=d-totalDays;if(remaining>0)milestones.push(`🎯 ${e.name} ${d}天：还有${remaining}天 (${formatDateWithWeekday(target.toISOString().split('T')[0])})`);else milestones.push(`✅ ${e.name} ${d}天：已完成 (${formatDateWithWeekday(target.toISOString().split('T')[0])})`);}for(let y=1;y<=5;y++){const anniversary=new Date(start.getTime()+y*365*86400000);const remaining=Math.floor((anniversary-todayDate)/86400000);if(remaining>-30&&remaining<365){if(remaining>0)milestones.push(`🎂 ${e.name} ${y}周年：还有${remaining}天 (${formatDateWithWeekday(anniversary.toISOString().split('T')[0])})`);else if(remaining===0)milestones.push(`🎂 ${e.name} ${y}周年：就是今天！`);else milestones.push(`🎂 ${e.name} ${y}周年：已过${Math.abs(remaining)}天`);}}document.getElementById('milestoneContent').innerHTML=milestones.length>0?milestones.join('<br>'):'还没有里程碑，继续加油哦~';document.getElementById('milestoneModal').classList.remove('hidden');}
  function renderEffectList(){const list=document.getElementById('effectList');list.innerHTML=effects.map(e=>`<span class="effect-option${appData.clickEffect===e.id?' selected':''}" data-id="${e.id}">${e.name}</span>`).join('');list.onclick=function(ev){const el=ev.target.closest('.effect-option');if(!el)return;appData.clickEffect=el.dataset.id;save();renderEffectList();};}
  function initSettingsPage(){document.getElementById('photoMode').value=appData.photoMode;renderEffectList();renderSkinOptions();}

  function renderSkinOptions(){
    const list=document.getElementById('skinList');
    list.innerHTML=skins.map(s=>`<span class="skin-option${appData.skin===s.id?' selected':''}" data-id="${s.id}">${s.emoji} ${s.name}</span>`).join('');
    list.onclick=function(e){const el=e.target.closest('.skin-option');if(!el)return;applySkin(el.dataset.id);renderSkinOptions();};
  }

  function openCardModal(){const e=appData.events.find(ev=>ev.id===currentEventId);if(!e)return;const canvas=document.getElementById('cardCanvas');const ctx=canvas.getContext('2d');canvas.width=500;canvas.height=500;if(e.photo){const img=new Image();img.onload=function(){ctx.drawImage(img,0,0,500,500);ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,500,500);finishCardPreview(ctx,e);};img.src=e.photo;}else{const bgMap={love:'#fce4ec',birthday:'#fff3e0',holiday:'#fffde0',life:'#f5f0e8',study:'#e8f0f8',custom:'#f3e5f5'};ctx.fillStyle=bgMap[e.category]||'#f3e5f5';ctx.fillRect(0,0,500,500);finishCardPreview(ctx,e);}function finishCardPreview(ctx,e){const days=calcDays(e.date);let numTxt;if(days===0)numTxt='🎉';else numTxt=Math.abs(days);const tc=e.titleColor||'#fff';ctx.fillStyle=tc;ctx.textAlign='center';ctx.shadowColor='rgba(0,0,0,0.3)';ctx.shadowBlur=8;ctx.font='bold 160px "PingFang SC","Microsoft YaHei"';ctx.fillText(numTxt,250,260);ctx.font='bold 40px "PingFang SC","Microsoft YaHei"';ctx.fillText('天',250,320);ctx.font='bold 30px "PingFang SC","Microsoft YaHei"';ctx.fillText(e.name,250,390);ctx.font='24px "PingFang SC","Microsoft YaHei"';ctx.fillText(formatEventDate(e),250,430);const dataURL=canvas.toDataURL('image/png');const preview=document.getElementById('cardPreview');preview.style.backgroundImage=`url(${dataURL})`;preview.querySelector('#cardNumber').textContent='';preview.querySelector('#cardLabel').textContent='长按图片可保存';}document.getElementById('cardModal').classList.remove('hidden');}
  function saveCardImage(){const canvas=document.getElementById('cardCanvas');try{const dataURL=canvas.toDataURL('image/png');const link=document.createElement('a');link.download=`${today}_卡片.png`;link.href=dataURL;document.body.appendChild(link);link.click();document.body.removeChild(link);alert('✅ 卡片已保存到相册！');}catch(err){alert('保存失败，请尝试长按预览图手动保存。');}}
  function exportData(){const blob=new Blob([JSON.stringify(appData,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=`宝宝纪念日_备份_${today}.json`;a.click();URL.revokeObjectURL(url);}
  function importData(file){const reader=new FileReader();reader.onload=function(e){try{const data=JSON.parse(e.target.result);if(data.events){appData=data;save();renderHome();alert('数据导入成功！');}else{alert('文件格式不正确');}}catch(ex){alert('文件解析失败');}};reader.readAsText(file);}
  function updateBroEmoji(){const bro=document.getElementById('broEmoji');const todayEvents=appData.events.filter(e=>calcDays(e.date)===0);if(todayEvents.length>0){const cats=todayEvents.map(e=>e.category);if(cats.includes('birthday'))bro.textContent='🎂';else if(cats.includes('love'))bro.textContent='💖';else bro.textContent='🎉';}else{bro.textContent='🧸';}}

  document.addEventListener('click',function(e){if(e.target.closest('button')||e.target.closest('input')||e.target.closest('select')||e.target.closest('textarea')||e.target.closest('.modal-overlay'))return;if(appData.clickEffect==='none')return;const eff=effects.find(ef=>ef.id===appData.clickEffect);if(!eff)return;if(eff.type==='ripple'){const ripple=document.createElement('div');ripple.className='ripple';ripple.style.left=e.clientX+'px';ripple.style.top=e.clientY+'px';ripple.style.borderColor=eff.color;document.body.appendChild(ripple);setTimeout(()=>ripple.remove(),1000);return;}if(eff.type==='firefly'){for(let i=0;i<6;i++){const p=document.createElement('div');p.className='click-particle';const angle=(Math.PI*2*i)/6+Math.random()*0.5,dist=20+Math.random()*50;p.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:6px;height:6px;background:#ccff00;border-radius:50%;box-shadow:0 0 10px #ccff00;--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;animation-duration:${1+Math.random()}s`;document.body.appendChild(p);setTimeout(()=>p.remove(),1200);}return;}if(eff.type==='diamond'){for(let i=0;i<10;i++){const p=document.createElement('div');p.className='click-particle';const angle=(Math.PI*2*i)/10,dist=25+Math.random()*55;const size=4+Math.random()*8;p.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;width:${size}px;height:${size}px;background:#fff;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;animation-duration:0.9s`;document.body.appendChild(p);setTimeout(()=>p.remove(),1000);}return;}const count=eff.type==='pattern'?8:12;for(let i=0;i<count;i++){const p=document.createElement('div');p.className='click-particle';const angle=(Math.PI*2*i)/count,dist=30+Math.random()*60;p.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;font-size:${14+Math.random()*16}px;--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;${eff.type==='pattern'?'':`width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;background:${eff.color==='random'?`hsl(${Math.random()*360},80%,60%)`:eff.color};border-radius:50%`}`;if(eff.type==='pattern')p.textContent=eff.emoji;document.body.appendChild(p);setTimeout(()=>p.remove(),800);}});

  document.getElementById('broEmoji').addEventListener('click',function(e){const heart=document.createElement('span');heart.textContent='💖';heart.className='heart-particle';const rect=this.getBoundingClientRect();heart.style.left=(rect.left+rect.width/2-12)+'px';heart.style.top=(rect.top-10)+'px';document.body.appendChild(heart);setTimeout(()=>heart.remove(),1500);const quotes=[getTimeGreeting(),randomQuote('home'),randomQuote('life'),randomQuote('love'),'宝宝今天真可爱~','哥哥好想你呀','戳戳哥哥会让哥哥开心一整天','今天有什么想和哥哥分享的吗？','不管什么时候，哥哥都在这里','你是哥哥最珍贵的宝贝','每一天都要开开心心的哦','哥哥最喜欢看你笑了','宝宝最近越来越棒了','看到你哥哥就觉得好幸福','今天也要元气满满呀','记得多喝水哦宝宝','哥哥永远在这里等你','你的笑容是哥哥最想守护的东西'];document.getElementById('homeBroText').textContent=quotes[Math.floor(Math.random()*quotes.length)];});
  document.getElementById('detailBroEmoji').addEventListener('click',function(e){const heart=document.createElement('span');heart.textContent='💖';heart.className='heart-particle';const rect=this.getBoundingClientRect();heart.style.left=(rect.left+rect.width/2-12)+'px';heart.style.top=(rect.top-10)+'px';document.body.appendChild(heart);setTimeout(()=>heart.remove(),1500);const ev=appData.events.find(e=>e.id===currentEventId);document.getElementById('detailBroText').textContent=randomQuote(ev?ev.category:'love');});

  document.getElementById('calendarType').addEventListener('change',function(){if(this.value==='lunar'){document.getElementById('solarDateWrap').classList.add('hidden');document.getElementById('lunarDateWrap').classList.remove('hidden');fillLunarYears();fillLunarDays();}else{document.getElementById('solarDateWrap').classList.remove('hidden');document.getElementById('lunarDateWrap').classList.add('hidden');}});

  document.getElementById('goSettingsBtn').addEventListener('click',()=>{switchPage('settings');initSettingsPage();});
  document.getElementById('settingsBackBtn').addEventListener('click',()=>{switchPage('home');renderHome();});
  document.getElementById('detailBackBtn').addEventListener('click',()=>{switchPage('home');renderHome();});
  document.getElementById('diaryBackBtn').addEventListener('click',()=>{switchPage('detail');renderDetail();});
  document.getElementById('diaryBtn').addEventListener('click',()=>{renderDiary();switchPage('diary');});
  document.getElementById('milestoneBtn').addEventListener('click',renderMilestone);
  document.getElementById('closeMilestoneBtn').addEventListener('click',()=>document.getElementById('milestoneModal').classList.add('hidden'));
  document.getElementById('categoryFilter').addEventListener('click',function(e){const el=e.target.closest('.filter-tag');if(!el)return;this.querySelectorAll('.filter-tag').forEach(t=>t.classList.remove('active'));el.classList.add('active');currentFilter=el.dataset.cat;renderHome();});
  document.getElementById('searchInput').addEventListener('input',function(){searchQuery=this.value.trim();renderHome();});
  document.getElementById('pinEventBtn').addEventListener('click',function(){const e=appData.events.find(ev=>ev.id===currentEventId);if(!e)return;e.pinned=!e.pinned;save();renderDetail();renderHome();});
  document.getElementById('deleteEventBtn').addEventListener('click',function(){if(!confirm('确定要删除吗？'))return;appData.events=appData.events.filter(e=>e.id!==currentEventId);save();switchPage('home');renderHome();});
  document.getElementById('saveDiaryBtn').addEventListener('click',function(){const e=appData.events.find(ev=>ev.id===currentEventId);if(!e)return;e.diary=document.getElementById('diaryContent').value;save();const mood=detectMood(e.diary);if(mood&&broQuotes[mood]){document.getElementById('diaryBroText').textContent=randomQuote(mood);}else{document.getElementById('diaryBroText').textContent='日记已保存！这些回忆，哥哥帮你守着。';}});
  document.getElementById('changePhotoBtn').addEventListener('click',function(){const choice=confirm('📷 拍照 = 确定\n🖼️ 相册 = 取消');if(choice){document.getElementById('eventPhotoInput').onchange=function(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){const evt=appData.events.find(e=>e.id===currentEventId);if(evt){evt.photo=e.target.result;save();renderDetail();}};r.readAsDataURL(f);};document.getElementById('eventPhotoInput').click();}else{document.getElementById('eventGalleryInput').onchange=function(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){const evt=appData.events.find(e=>e.id===currentEventId);if(evt){evt.photo=e.target.result;save();renderDetail();}};r.readAsDataURL(f);};document.getElementById('eventGalleryInput').click();}});
  document.querySelectorAll('.color-dot').forEach(d=>{d.addEventListener('click',function(){const ev=appData.events.find(e=>e.id===currentEventId);if(!ev)return;ev.titleColor=this.dataset.color;save();renderDetail();});});
  document.getElementById('saveCardBtn').addEventListener('click',openCardModal);
  document.getElementById('saveCardImageBtn').addEventListener('click',saveCardImage);
  document.getElementById('closeCardBtn').addEventListener('click',()=>document.getElementById('cardModal').classList.add('hidden'));

  document.getElementById('addEventFAB').addEventListener('click',function(){document.getElementById('eventNameInput').value='';document.getElementById('eventDateInput').value=today;document.getElementById('eventEndDateInput').value='';document.getElementById('calendarType').value='solar';document.getElementById('solarDateWrap').classList.remove('hidden');document.getElementById('lunarDateWrap').classList.add('hidden');document.getElementById('addEventModal').classList.remove('hidden');});
  document.getElementById('cancelEventBtn').addEventListener('click',()=>document.getElementById('addEventModal').classList.add('hidden'));
  document.getElementById('saveEventBtn').addEventListener('click',async function(){const name=document.getElementById('eventNameInput').value.trim();const category=document.getElementById('eventCategory').value;const calendarType=document.getElementById('calendarType').value;const endDate=document.getElementById('eventEndDateInput').value;let date,lunarDate=null,endLunarDate=null;try{if(calendarType==='lunar'){const ly=parseInt(document.getElementById('lunarYearSelect').value);const lm=parseInt(document.getElementById('lunarMonthSelect').value);const ld=parseInt(document.getElementById('lunarDaySelect').value);const lmNames=['正月','二月','三月','四月','五月','六月','七月','八月','九月','十月','冬月','腊月'];const ldNames=['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];lunarDate=`${ly}年${lmNames[lm-1]}${ldNames[ld-1]}`;date=lunarToSolar(ly,lm,ld);if(endDate)endLunarDate=await getLunarDate(endDate);}else{date=document.getElementById('eventDateInput').value;lunarDate=await getLunarDate(date);if(endDate)endLunarDate=await getLunarDate(endDate);}if(!name||!date){alert('请填写名称和日期');return;}appData.events.push({id:Date.now(),name,date,category,calendarType,endDate:endDate||null,lunarDate:lunarDate,endLunarDate:endLunarDate,photo:null,diary:'',pinned:false,titleColor:'#fff'});save();document.getElementById('addEventModal').classList.add('hidden');renderHome();updateBroEmoji();}catch(err){alert('日期转换失败，请检查农历日期是否正确');}});

  document.getElementById('photoFromCamera').addEventListener('click',function(){document.getElementById('bgPhotoInput').onchange=function(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){appData.bgPhoto=e.target.result;save();applyBgPhoto();};r.readAsDataURL(f);};document.getElementById('bgPhotoInput').click();});
  document.getElementById('photoFromGallery').addEventListener('click',function(){document.getElementById('bgGalleryInput').onchange=function(ev){const f=ev.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(e){appData.bgPhoto=e.target.result;save();applyBgPhoto();};r.readAsDataURL(f);};document.getElementById('bgGalleryInput').click();});
  document.getElementById('photoRemove').addEventListener('click',function(){appData.bgPhoto=null;save();applyBgPhoto();});
  document.getElementById('photoMode').addEventListener('change',function(){appData.photoMode=this.value;save();applyBgPhoto();});
  document.getElementById('exportDataBtn').addEventListener('click',exportData);
  document.getElementById('importDataBtn').addEventListener('click',function(){document.getElementById('importFileInput').click();});
  document.getElementById('importFileInput').addEventListener('change',function(ev){const f=ev.target.files[0];if(f)importData(f);});
  document.getElementById('addEventModal').addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden');});
  document.getElementById('milestoneModal').addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden');});
  document.getElementById('cardModal').addEventListener('click',function(e){if(e.target===this)this.classList.add('hidden');});

  const manifest={name:'宝宝纪念日',short_name:'纪念日',start_url:location.href,display:'standalone',background_color:'#fff5f9',theme_color:'#fff5f9',icons:[{src:"data:image/svg+xml,"+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="20" fill="#ffd1e0"/><text y=".9em" font-size="70" text-anchor="middle" x="50">📅</text></svg>'),sizes:'100x100',type:'image/svg+xml'}]};
  document.getElementById('pwaManifest').href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));

  applySkin(appData.skin);applyBgPhoto();renderHome();updateBroEmoji();fillLunarYears();fillLunarDays();
})();
