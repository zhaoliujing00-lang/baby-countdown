<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>📅 宝宝纪念日</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宝宝纪念日">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ffd1e0'/><text y='.9em' font-size='70' text-anchor='middle' x='50'>📅</text></svg>">
  <link rel="manifest" id="pwaManifest">
  <meta name="theme-color" content="#fff5f9">
  <style>
    :root{--bg:#fff5f9;--card:#fff;--pink:#ffd1e0;--rose:#f9a8c4;--shadow:0 6px 22px rgba(210,180,190,0.25);--radius:26px;--font:'PingFang SC','Microsoft YaHei',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:var(--bg);font-family:var(--font);min-height:100vh;display:flex;justify-content:center;align-items:flex-start;padding:16px;color:#4a3a42;transition:background 0.6s;position:relative;overflow-x:hidden}
    .photo-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background-size:cover;background-position:center;background-repeat:no-repeat;display:none}
    .photo-bg.active{display:block}
    .photo-bg.blur{filter:blur(8px)}
    .app-container{width:100%;max-width:480px;background:rgba(255,248,250,0.75);backdrop-filter:blur(6px);border-radius:38px;box-shadow:0 20px 45px rgba(180,130,150,0.3),inset 0 1px 10px rgba(255,255,255,0.4);padding:18px 16px;border:2px solid rgba(255,220,230,0.6);position:relative;z-index:1;min-height:calc(100vh - 32px);display:flex;flex-direction:column}
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-shrink:0}
    .title{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#d47b8c,#b578a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-btns button{background:#fff;border:none;padding:8px 14px;border-radius:30px;font-weight:600;color:#b17a8a;margin-left:6px;cursor:pointer;font-size:0.85rem;box-shadow:0 2px 8px rgba(180,150,160,0.1)}
    .card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:0 3px 10px rgba(180,150,160,0.15);border:2px solid #fbdde5;position:relative}
    .page{display:none;flex:1;flex-direction:column}
    .page.active{display:flex}
    .bro-area{text-align:center;position:relative;padding:8px 0;flex-shrink:0}
    .bro-emoji{font-size:4rem;display:inline-block;cursor:pointer;transition:transform 0.2s;user-select:none;position:relative;z-index:3}
    .bro-emoji:active{transform:scale(1.2)}
    .heart-particle{position:absolute;font-size:1.5rem;animation:floatUp 1.5s ease-out forwards;pointer-events:none;z-index:10}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.8)}}
    .click-particle{position:fixed;pointer-events:none;z-index:999;animation:clickBurst 0.8s ease-out forwards}
    @keyframes clickBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
    .category-filter{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none;-ms-overflow-style:none;flex-shrink:0}
    .category-filter::-webkit-scrollbar{display:none}
    .filter-tag{white-space:nowrap;padding:6px 14px;border-radius:20px;font-size:0.78rem;font-weight:600;cursor:pointer;background:#fff;color:#b17a8a;border:1.5px solid #f0c8d8;transition:0.2s;flex-shrink:0}
    .filter-tag.active{background:#f9a8c4;color:#fff;border-color:#f9a8c4}
    .search-input{width:100%;padding:8px 14px;border-radius:20px;border:1.5px solid #f0c8d8;font-size:0.8rem;background:#fffbfc;margin-bottom:8px;flex-shrink:0}
    .event-card{background:var(--card);border-radius:20px;padding:14px;margin-bottom:10px;box-shadow:0 3px 10px rgba(180,150,160,0.12);border-left:5px solid #f9a8c4;cursor:pointer;display:flex;align-items:center;gap:12px;transition:0.2s;flex-shrink:0}
    .event-card:active{transform:scale(0.97)}
    .event-card.near{border-left-color:#ff6b7a;background:#fff5f7}
    .event-icon{font-size:2rem;min-width:48px;text-align:center}
    .event-info{flex:1}
    .event-name{font-weight:700;font-size:1rem}
    .event-date{font-size:0.75rem;color:#b17a8a}
    .event-days{font-weight:700;font-size:1.1rem;text-align:right;min-width:60px}
    .event-days.past{color:#b17a8a}
    .event-days.future{color:#d47b8c}
    .event-list-wrapper{flex:1;overflow-y:auto;margin-bottom:10px}
    .detail-photo-card{position:relative;border-radius:var(--radius);overflow:hidden;min-height:280px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:var(--shadow);margin-bottom:14px;background-size:cover;background-position:center;background-repeat:no-repeat;flex-shrink:0}
    .detail-photo-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.25);z-index:1}
    .detail-content{position:relative;z-index:2;text-align:center;padding:20px}
    .detail-number{font-size:5rem;font-weight:800;text-shadow:0 4px 20px rgba(0,0,0,0.3);line-height:1}
    .detail-label{font-size:1.2rem;font-weight:600;margin:6px 0;text-shadow:0 2px 8px rgba(0,0,0,0.3)}
    .detail-date-text{font-size:0.9rem;opacity:0.9;text-shadow:0 1px 4px rgba(0,0,0,0.3)}
    .bro-bubble{background:#fff;border-radius:22px;padding:14px;display:flex;gap:10px;align-items:center;border:1.5px solid #fad6e5;flex-shrink:0}
    .add-btn-fixed{position:fixed;bottom:30px;right:30px;width:56px;height:56px;border-radius:50%;background:#f9a8c4;color:#fff;font-size:2rem;border:none;box-shadow:0 6px 20px rgba(200,120,150,0.4);cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center}
    .modal-sheet{background:#fffef9;border-radius:28px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
    .modal-sheet h3{margin-bottom:12px;color:#4a3a42;text-align:center}
    .modal-sheet input,.modal-sheet select{margin:6px 0;width:100%;padding:10px;border-radius:16px;border:1.5px solid #f0c8d8;font-size:0.9rem;background:#fffbfc}
    .modal-sheet button{margin:6px 4px;background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:10px 18px;border-radius:20px;cursor:pointer;font-size:0.9rem}
    .modal-sheet .close-btn{background:#ddd;color:#555}
    .effect-option{display:inline-block;padding:8px 12px;margin:4px;border-radius:20px;cursor:pointer;border:2px solid transparent;font-size:0.85rem;background:#fff;transition:0.2s}
    .effect-option.selected{border-color:#f9a8c4;background:#fff0f5}
    .back-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:0 8px}
    .hidden{display:none!important}
    .empty-state{padding:40px 20px;text-align:center;color:#b17a8a;flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column}
    .tag{display:inline-block;padding:4px 10px;border-radius:12px;font-size:0.7rem;font-weight:700;margin-right:4px}
    .tag.love{background:#ffe0e8;color:#d4687c}
    .tag.birthday{background:#fff0e0;color:#e8945c}
    .tag.holiday{background:#fffde0;color:#d4a017}
    .tag.life{background:#f5f0e8;color:#8b7355}
    .tag.study{background:#e8f0f8;color:#5a7d9a}
    .tag.custom{background:#f0e6fa;color:#8b6b9a}
    textarea{width:100%;min-height:150px;padding:12px;border-radius:16px;border:1.5px solid #f0c8d8;font-size:0.9rem;background:#fffbfc;font-family:var(--font);resize:vertical}
    .setting-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed #f3d8e2}
    .setting-label{font-weight:600;font-size:0.9rem}
    .color-dot{display:inline-block;width:28px;height:28px;border-radius:50%;margin:3px;cursor:pointer;border:3px solid transparent;transition:0.2s}
    .color-dot.selected{border-color:#d47b8c;transform:scale(1.2)}
    .pin-btn{background:none;border:none;font-size:1.2rem;cursor:pointer;padding:0 4px;opacity:0.5;transition:0.2s}
    .pin-btn.pinned{opacity:1}
    .backup-btn{background:#fff;border:1.5px solid #f0c8d8;padding:8px 14px;border-radius:20px;font-size:0.8rem;cursor:pointer;margin-top:8px;width:100%}
  </style>
</head>
<body id="mainBody">
<div class="photo-bg" id="photoBg"></div>

<div class="app-container" id="app">
  <!-- ====== 主页 ====== -->
  <div class="page active" id="page-home">

      <span class="title">📅 宝宝纪念日</span>

    <div class="category-filter" id="categoryFilter">

      <span class="filter-tag" data-cat="love">💝 纪念日</span>
      <span class="filter-tag" data-cat="birthday">🎂 生日</span>
      <span class="filter-tag" data-cat="holiday">🎉 节日</span>
      <span class="filter-tag" data-cat="life">🏠 生活</span>

  </div>

  <!-- ====== 详情页 ====== -->
  <div class="page" id="page-detail">

    <div class="detail-photo-card" id="detailPhotoCard">
      <div class="detail-content">

        <div class="detail-date-text" id="detailDateText"></div>

    </div>
    <div class="bro-bubble"><span style="font-size:1.5rem">🧸</span><span id="detailBroText"></span></div>
    <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
      <button id="milestoneBtn" style="flex:1;background:#ffe0b2;border:none;color:#8b5a2e;font-weight:700;padding:8px;border-radius:20px;cursor:pointer;font-size:0.8rem">🚩 里程碑</button>
      <button id="diaryBtn" style="flex:1;background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:8px;border-radius:20px;cursor:pointer;font-size:0.8rem">📝 日记</button>
      <button id="changePhotoBtn" style="flex:1;background:#dac4f7;border:none;color:#fff;font-weight:700;padding:8px;border-radius:20px;cursor:pointer;font-size:0.8rem">📷 换图</button>
      <button id="saveCardBtn" style="flex:1;background:#c8e6c9;border:none;color:#2e5a30;font-weight:700;padding:8px;border-radius:20px;cursor:pointer;font-size:0.8rem">💾 卡片</button>
    </div>
    <div style="display:flex;gap:6px;margin-top:6px">
      <button id="pinEventBtn" style="flex:1;background:#fff;border:1.5px solid #f0c8d8;font-weight:700;padding:8px;border-radius:20px;cursor:pointer;font-size:0.8rem">📌 置顶</button>
      <button id="deleteEventBtn" style="flex:1;background:#ffcccc;border:none;color:#c44;font-weight:700;padding:8px;border-radius:20px;cursor:pointer;font-size:0.8rem">🗑️ 删除</button>
    </div>
<div style="margin-top:8px;text-align:center;padding-bottom:70px">
  <span style="font-size:0.75rem;color:#b17a8a;margin-right:4px">文字颜色：</span>
    <span class="color-dot" data-color="#fff" style="background:#fff;border:2px solid #ddd"></span>
      <span class="color-dot" data-color="#ffb3ba" style="background:#ffb3ba"></span>
      <span class="color-dot" data-color="#ffffba" style="background:#ffffba"></span>
      <span class="color-dot" data-color="#bae1ff" style="background:#bae1ff"></span>
      <span class="color-dot" data-color="#baffc9" style="background:#baffc9"></span>

      <span class="color-dot" data-color="#ffd4ba" style="background:#ffd4ba"></span>
    </div>
  </div>

  <!-- ====== 日记页 ====== -->
  <div class="page" id="page-diary">
    <div class="header"><button class="back-btn" id="diaryBackBtn">←</button><span class="title">📝 日记</span><button id="diaryBgToggle" style="background:#fff;border:1.5px solid #f0c8d8;padding:4px 10px;border-radius:16px;font-size:0.75rem;cursor:pointer">🖼️ 切换背景</button></div>
    <div class="bro-bubble" style="margin-bottom:10px"><span style="font-size:1.5rem">🧸</span><span id="diaryBroText">写下关于这一天的回忆吧，哥哥陪着你。</span></div>
    <textarea id="diaryContent" placeholder="写下关于这一天的回忆..."></textarea>

  </div>

  <!-- ====== 设置页 ====== -->
  <div class="page" id="page-settings">
    <div class="header"><button class="back-btn" id="settingsBackBtn">←</button><span class="title">⚙️ 设置</span><span></span></div>
    <div class="card">
      <div class="setting-row"><span class="setting-label">📷 背景照片</span></div>

</div>

  // 时间问候
  function getTimeGreeting(){
    const h = new Date().getHours();
    if(h>=5 && h<9) return '早安宝宝，今天会是美好的一天~';
    if(h>=9 && h<12) return '上午好，今天有什么计划吗？';
    if(h>=12 && h<14) return '中午好，记得好好吃午饭哦~';
    if(h>=14 && h<18) return '下午好，累了就歇会儿~';
    if(h>=18 && h<22) return '晚上好，今天过得开心吗？';
    return '夜深了，宝宝还在想什么呢？哥哥陪你。';
  }

  function randomQuote(cat){ const list = broQuotes[cat] || broQuotes.home; return list[Math.floor(Math.random()*list.length)]; }

  // 星期
  function getWeekday(dateStr){
    const d = new Date(dateStr + 'T00:00:00');
    const w = ['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
    return w[d.getDay()];
  }

  function formatDateWithWeekday(dateStr){ return dateStr + ' ' + getWeekday(dateStr); }

  // 天数计算
  function calcDays(eventDate){
    const t = new Date(); t.setHours(0,0,0,0);
    const target = new Date(eventDate + 'T00:00:00');
    return Math.floor((target.getTime() - t.getTime()) / 86400000);
  }

  // ========== 主页 ==========
  function renderHome(){
    const list = document.getElementById('eventList'), empty = document.getElementById('emptyState');
    let filtered = appData.events;
    if(currentFilter!=='all') filtered = filtered.filter(e=>e.category===currentFilter);
    if(searchQuery) filtered = filtered.filter(e=>e.name.includes(searchQuery));
    if(filtered.length===0){list.innerHTML='';empty.classList.remove('hidden');document.getElementById('homeBroText').textContent=randomQuote('empty');return;}
    empty.classList.add('hidden');
    const sorted = [...filtered].sort((a,b)=>{
      if(a.pinned&&!b.pinned)return -1; if(!a.pinned&&b.pinned)return 1;
      return Math.abs(calcDays(a.date)) - Math.abs(calcDays(b.date));
    });
    const iconMap={love:'💝',birthday:'🎂',holiday:'🎉',life:'🏠',study:'📚',custom:'📝'};
    const tagClass={love:'love',birthday:'birthday',holiday:'holiday',life:'life',study:'study',custom:'custom'};
    const tagName={love:'纪念日',birthday:'生日',holiday:'节日',life:'生活',study:'学习',custom:'自定义'};
    list.innerHTML = sorted.map(e=>{
      const days=calcDays(e.date), isNear=Math.abs(days)<=7&&days>=0, isPast=days<0;
      let dt; if(days===0)dt='今天！'; else if(days>0)dt=`${days}天后`; else dt=`${Math.abs(days)}天前`;
      return `<div class="event-card${isNear?' near':''}" data-id="${e.id}">
        <div class="event-icon">${iconMap[e.category]}</div>
        <div class="event-info"><div class="event-name">${e.pinned?'📌 ':''}${e.name}<span class="tag ${tagClass[e.category]}">${tagName[e.category]}</span></div>
        <div class="event-date">${formatDateWithWeekday(e.date)}${e.endDate?' → '+formatDateWithWeekday(e.endDate):''}</div></div>
        <div class="event-days ${isPast?'past':'future'}">${dt}</div></div>`;
    }).join('');
    list.querySelectorAll('.event-card').forEach(c=>{c.addEventListener('click',function(){currentEventId=parseInt(this.dataset.id);renderDetail();switchPage('detail');});});
    document.getElementById('homeBroText').textContent = getTimeGreeting();

  // ========== 里程碑 ==========
  function renderMilestone(){
    const e = appData.events.find(ev=>ev.id===currentEventId); if(!e) return;
    const start = new Date(e.date+'T00:00:00');
    const todayDate = new Date(); todayDate.setHours(0,0,0,0);
    const totalDays = Math.floor((todayDate - start) / 86400000);
    const milestones = [];
    for(let d=100; d<=totalDays+365; d+=100){
      const target = new Date(start.getTime() + d*86400000);
      const remaining = d - totalDays;
      if(remaining>0) milestones.push(`🎯 ${e.name} ${d}天：还有${remaining}天 (${formatDateWithWeekday(target.toISOString().split('T')[0])})`);
      else milestones.push(`✅ ${e.name} ${d}天：已完成 (${formatDateWithWeekday(target.toISOString().split('T')[0])})`);
    }
    // 周年
    for(let y=1; y<=5; y++){
      const anniversary = new Date(start.getTime() + y*365*86400000);
      const remaining = Math.floor((anniversary - todayDate) / 86400000);
      if(remaining>-30 && remaining<365){
        if(remaining>0) milestones.push(`🎂 ${e.name} ${y}周年：还有${remaining}天 (${formatDateWithWeekday(anniversary.toISOString().split('T')[0])})`);
        else if(remaining===0) milestones.push(`🎂 ${e.name} ${y}周年：就是今天！`);
        else milestones.push(`🎂 ${e.name} ${y}周年：已过${Math.abs(remaining)}天`);
      }
    }
    document.getElementById('milestoneContent').innerHTML = milestones.length>0 ? milestones.join('<br>') : '还没有里程碑，继续加油哦~';
    document.getElementById('milestoneModal').classList.remove('hidden');
  }

  function saveCardImage(){
    const canvas = document.getElementById('cardCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 500; canvas.height = 500;
    const e = appData.events.find(ev=>ev.id===currentEventId); if(!e) return;
    // 背景
    if(e.photo){
      const img = new Image();
      img.onload = function(){
        ctx.drawImage(img, 0, 0, 500, 500);
        ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(0,0,500,500);
        drawCardText(ctx, e);
      };
      img.src = e.photo;
    } else {
      const bgMap={love:'#fce4ec',birthday:'#fff3e0',holiday:'#fffde0',life:'#f5f0e8',study:'#e8f0f8',custom:'#f3e5f5'};
      ctx.fillStyle=bgMap[e.category]||'#f3e5f5'; ctx.fillRect(0,0,500,500);
      drawCardText(ctx, e);
    }
  }

  function drawCardText(ctx, e){
    const days=calcDays(e.date); let numTxt; if(days===0)numTxt='🎉'; else numTxt=Math.abs(days);
    const tc = e.titleColor || '#fff';
    ctx.fillStyle = tc; ctx.textAlign = 'center'; ctx.shadowColor = 'rgba(0,0,0,0.3)'; ctx.shadowBlur = 8;
    ctx.font = 'bold 160px "PingFang SC","Microsoft YaHei"'; ctx.fillText(numTxt, 250, 260);
    ctx.font = 'bold 40px "PingFang SC","Microsoft YaHei"'; ctx.fillText('天', 250, 320);
    ctx.font = 'bold 30px "PingFang SC","Microsoft YaHei"'; ctx.fillText(e.name, 250, 390);
    ctx.font = '24px "PingFang SC","Microsoft YaHei"'; ctx.fillText(formatDateWithWeekday(e.date), 250, 430);
    canvas.toBlob(function(blob){
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `${e.name}_卡片.png`; a.click();
      URL.revokeObjectURL(url);
    });
  }
