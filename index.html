<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes, viewport-fit=cover">
  <title>📅 宝宝纪念日</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="宝宝纪念日">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ffd1e0'/><text y='.9em' font-size='70' text-anchor='middle' x='50'>📅</text></svg>">
  <link rel="manifest" id="pwaManifest">
  <meta name="theme-color" content="#fff5f9">
  <style>
    :root{--bg:#fff5f9;--card:#fff;--pink:#ffd1e0;--rose:#f9a8c4;--shadow:0 6px 22px rgba(210,180,190,0.25);--radius:26px;--font:'PingFang SC','Microsoft YaHei',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);font-family:var(--font);min-height:100vh;display:flex;
      justify-content:center;align-items:flex-start;padding:16px;color:#4a3a42;
      transition:background 0.6s;position:relative;overflow-x:hidden;
    }
    .photo-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;background-size:cover;background-position:center;background-repeat:no-repeat;display:none}
    .photo-bg.active{display:block}
    .photo-bg.blur{filter:blur(8px)}
    .app-container{
      width:100%;max-width:480px;background:rgba(255,248,250,0.75);
      backdrop-filter:blur(18px);border-radius:38px;
      box-shadow:0 20px 45px rgba(180,130,150,0.3), inset 0 1px 10px rgba(255,255,255,0.7);
      padding:18px 16px;border:2px solid rgba(255,220,230,0.6);position:relative;z-index:1;
    }
    .header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .title{font-size:1.5rem;font-weight:700;background:linear-gradient(135deg,#d47b8c,#b578a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-btns button{background:#fff;border:none;padding:8px 14px;border-radius:30px;font-weight:600;color:#b17a8a;margin-left:6px;cursor:pointer;font-size:0.85rem;box-shadow:0 2px 8px rgba(180,150,160,0.1)}
    .card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:0 3px 10px rgba(180,150,160,0.15);border:2px solid #fbdde5;position:relative}
    .page{display:none}
    .page.active{display:block}
    .bro-area{text-align:center;position:relative;padding:8px 0}
    .bro-emoji{font-size:4rem;display:inline-block;cursor:pointer;transition:transform 0.2s;user-select:none;position:relative;z-index:3}
    .bro-emoji:active{transform:scale(1.2)}
    .heart-particle{position:absolute;font-size:1.5rem;animation:floatUp 1.5s ease-out forwards;pointer-events:none;z-index:10}
    @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-100px) scale(1.8)}}
    .click-particle{position:fixed;pointer-events:none;z-index:999;animation:clickBurst 0.8s ease-out forwards}
    @keyframes clickBurst{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}
        .event-card{background:var(--card);border-radius:20px;padding:14px;margin-bottom:10px;box-shadow:0 3px 10px rgba(180,150,160,0.12);border-left:5px solid #f9a8c4;cursor:pointer;display:flex;align-items:center;gap:12px;transition:0.2s}
    .event-card:active{transform:scale(0.97)}
    .event-card.near{border-left-color:#ff6b7a;background:#fff5f7}
    .event-icon{font-size:2rem;min-width:48px;text-align:center}
    .event-info{flex:1}
    .event-name{font-weight:700;font-size:1rem}
    .event-date{font-size:0.75rem;color:#b17a8a}
    .event-days{font-weight:700;font-size:1.1rem;text-align:right;min-width:60px}
    .event-days.past{color:#b17a8a}
    .event-days.future{color:#d47b8c}
    .detail-photo-card{position:relative;border-radius:var(--radius);overflow:hidden;min-height:280px;display:flex;flex-direction:column;justify-content:center;align-items:center;box-shadow:var(--shadow);margin-bottom:14px;background-size:cover;background-position:center;background-repeat:no-repeat}
    .detail-photo-card::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.25);z-index:1}
    .detail-content{position:relative;z-index:2;text-align:center;color:#fff;padding:20px}
    .detail-number{font-size:5rem;font-weight:800;text-shadow:0 4px 20px rgba(0,0,0,0.3);line-height:1}
    .detail-label{font-size:1.2rem;font-weight:600;margin:6px 0;text-shadow:0 2px 8px rgba(0,0,0,0.3)}
    .detail-date-text{font-size:0.9rem;opacity:0.9;text-shadow:0 1px 4px rgba(0,0,0,0.3)}
    .bro-bubble{background:#fff;border-radius:22px;padding:14px;display:flex;gap:10px;align-items:center;border:1.5px solid #fad6e5}
    .add-btn-fixed{position:fixed;bottom:30px;right:30px;width:56px;height:56px;border-radius:50%;background:#f9a8c4;color:#fff;font-size:2rem;border:none;box-shadow:0 6px 20px rgba(200,120,150,0.4);cursor:pointer;z-index:50;display:flex;align-items:center;justify-content:center}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:100;display:flex;align-items:center;justify-content:center}
    .modal-sheet{background:#fffef9;border-radius:28px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
    .modal-sheet h3{margin-bottom:12px;color:#4a3a42;text-align:center}
    .modal-sheet input,.modal-sheet select{margin:6px 0;width:100%;padding:10px;border-radius:16px;border:1.5px solid #f0c8d8;font-size:0.9rem;background:#fffbfc}
    .modal-sheet button{margin:6px 4px;background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:10px 18px;border-radius:20px;cursor:pointer;font-size:0.9rem}
    .modal-sheet .close-btn{background:#ddd;color:#555}
    .skin-card{display:inline-block;width:75px;height:75px;border-radius:20px;margin:5px;cursor:pointer;border:3px solid transparent;text-align:center;line-height:75px;font-size:0.7rem;font-weight:700}
    .skin-card.selected{border-color:#d47b8c}
    .skin-card.locked{opacity:0.5}
    .effect-option{display:inline-block;padding:8px 12px;margin:4px;border-radius:20px;cursor:pointer;border:2px solid transparent;font-size:0.85rem;background:#fff;transition:0.2s}
    .effect-option.selected{border-color:#f9a8c4;background:#fff0f5}
    .coin-display{background:#fff;padding:6px 14px;border-radius:30px;font-weight:700;color:#d4a017;display:inline-block;margin-bottom:10px;font-size:0.85rem}
    .back-btn{background:none;border:none;font-size:1.5rem;cursor:pointer;padding:0 8px}
    .hidden{display:none!important}
    .text-center{text-align:center}
    .empty-state{padding:40px 20px;text-align:center;color:#b17a8a}
    .tag{display:inline-block;padding:4px 10px;border-radius:12px;font-size:0.7rem;font-weight:700;margin-right:4px}
    .tag.love{background:#ffe0e8;color:#d4687c}
    .tag.birthday{background:#fff0e0;color:#e8945c}
    .tag.holiday{background:#fffde0;color:#d4a017}
    .tag.custom{background:#f0e6fa;color:#8b6b9a}
    textarea{width:100%;min-height:150px;padding:12px;border-radius:16px;border:1.5px solid #f0c8d8;font-size:0.9rem;background:#fffbfc;font-family:var(--font);resize:vertical}
  </style>
</head>
<body id="mainBody">
<div class="photo-bg" id="photoBg"></div>

<div class="app-container" id="app">
  <!-- ====== 主页：事件列表 ====== -->
  <div class="page active" id="page-home">
    <div class="header">
      <span class="title">📅 宝宝纪念日</span>
      <div class="nav-btns">
        <button id="openSettingsBtn">⚙️</button>
        <button id="goShopBtn">🎨</button>
      </div>
    </div>
    <div class="bro-area" id="broArea">
      <div class="bro-emoji" id="broEmoji">🧸</div>
    </div>
    <div id="eventList"></div>
    <div class="empty-state" id="emptyState">✨ 还没有纪念日<br>点击右下角 + 添加吧</div>
    <div class="bro-bubble" style="margin-top:14px"><span style="font-size:1.5rem">🧸</span><span id="homeBroText">宝宝还没有添加纪念日哦~</span></div>
  </div>

  <!-- ====== 详情页 ====== -->
  <div class="page" id="page-detail">
    <div class="header"><button class="back-btn" id="detailBackBtn">←</button><span class="title">📅 事件详情</span><span></span></div>
    <div class="bro-area"><div class="bro-emoji" id="detailBroEmoji">🧸</div></div>
    <div class="detail-photo-card" id="detailPhotoCard">
      <div class="detail-content">
        <div class="detail-number" id="detailNumber">0</div>
        <div class="detail-label" id="detailLabel">天</div>
        <div class="detail-date-text" id="detailDateText"></div>
      </div>
    </div>
    <div class="bro-bubble"><span style="font-size:1.5rem">🧸</span><span id="detailBroText"></span></div>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button id="diaryBtn" style="flex:1;background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:10px;border-radius:20px;cursor:pointer">📝 日记</button>
      <button id="changePhotoBtn" style="flex:1;background:#dac4f7;border:none;color:#fff;font-weight:700;padding:10px;border-radius:20px;cursor:pointer">📷 换图</button>
    </div>
    <button id="deleteEventBtn" style="width:100%;margin-top:8px;background:#ffcccc;border:none;color:#c44;font-weight:700;padding:10px;border-radius:20px;cursor:pointer">🗑️ 删除事件</button>
  </div>

  <!-- ====== 日记页 ====== -->
  <div class="page" id="page-diary">
    <div class="header"><button class="back-btn" id="diaryBackBtn">←</button><span class="title">📝 日记</span><span id="diaryTitle"></span></div>
    <div class="bro-bubble" style="margin-bottom:10px"><span style="font-size:1.5rem">🧸</span><span id="diaryBroText">写下关于这一天的回忆吧，哥哥陪着你。</span></div>
    <textarea id="diaryContent" placeholder="写下关于这一天的回忆..."></textarea>
    <button id="saveDiaryBtn" style="width:100%;margin-top:10px;background:#f9a8c4;border:none;color:#fff;font-weight:700;padding:12px;border-radius:20px;cursor:pointer">💾 保存日记</button>
  </div>

  <!-- ====== 皮肤商店 ====== -->
  <div class="page" id="page-shop">
    <div class="header"><button class="back-btn" id="shopBackBtn">←</button><span class="title">🎨 皮肤商店</span><span></span></div>
    <div class="coin-display">🪙 <span id="shopCoinCount">0</span> 金币</div>
    <div id="skinList" style="text-align:center"></div>
    <div class="bro-bubble"><span style="font-size:1.5rem">🧸</span><span id="shopBroText">金币可以通过添加纪念日获得哦~</span></div>
  </div>

  <!-- ====== 设置弹窗 ====== -->
  <div class="modal-overlay hidden" id="settingsModal">
    <div class="modal-sheet">
      <h3>⚙️ 自定义设置</h3>
      <div style="font-size:0.8rem;color:#b17a8a;margin-bottom:4px;font-weight:700">📷 背景照片</div>
      <button id="photoFromCamera">📷 拍照</button>
      <button id="photoFromGallery">🖼️ 相册</button>
      <button id="photoRemove" class="close-btn">🗑️ 移除照片</button>
      <div style="font-size:0.8rem;color:#b17a8a;margin:8px 0 4px;font-weight:700">🌫️ 照片模式</div>
      <select id="photoMode"><option value="clear">全屏清晰</option><option value="blur">柔和模糊</option></select>
      <div style="font-size:0.8rem;color:#b17a8a;margin:8px 0 4px;font-weight:700">✨ 点击特效</div>
      <div id="effectList"></div>
      <button id="closeSettingsBtn" class="close-btn" style="margin-top:12px">关闭</button>
    </div>
  </div>

  <!-- ====== 添加事件弹窗 ====== -->
  <div class="modal-overlay hidden" id="addEventModal">
    <div class="modal-sheet">
      <h3>✨ 添加事件</h3>
      <input type="text" id="eventNameInput" placeholder="事件名称">
      <select id="eventCategory">
        <option value="love">💝 纪念日</option>
        <option value="birthday">🎂 生日</option>
        <option value="holiday">🎉 节日</option>
        <option value="custom">📝 自定义</option>
      </select>
      <select id="calendarType">
        <option value="solar">☀️ 阳历</option>
        <option value="lunar">🌙 农历</option>
      </select>
      <input type="date" id="eventDateInput">
      <div style="display:flex;gap:8px;margin-top:8px">
        <button id="saveEventBtn" style="flex:1">💾 保存</button>
        <button id="cancelEventBtn" class="close-btn" style="flex:1">取消</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none">
<input type="file" id="galleryInput" accept="image/*" style="display:none">
<input type="file" id="bgPhotoInput" accept="image/*" style="display:none">
<input type="file" id="bgGalleryInput" accept="image/*" style="display:none">
<input type="file" id="eventPhotoInput" accept="image/*" style="display:none">
<input type="file" id="eventGalleryInput" accept="image/*" style="display:none">

<button class="add-btn-fixed" id="addEventFAB">+</button>
<script>
(function(){
  const STORAGE_KEY = 'countdown_v1';
  let appData = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
  if(!appData.events) appData.events = [];
  if(!appData.coins) appData.coins = 0;
  if(!appData.skins) appData.skins = {owned:['default'],active:'default'};
  if(!appData.bgPhoto) appData.bgPhoto = null;
  if(!appData.photoMode) appData.photoMode = 'clear';
  if(!appData.clickEffect) appData.clickEffect = 'hearts';
  let currentEventId = null;

  function save(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

  // 皮肤
  const skins = [
    {id:'default',name:'奶油粉',bg:'linear-gradient(145deg,#ffecf2,#fde4ee 40%,#f2e2fa)',price:0,emoji:'🌸'},
    {id:'starry',name:'星空蓝',bg:'linear-gradient(145deg,#1a1a3e,#2d2d5e 40%,#1a1a4e)',price:50,emoji:'🌟'},
    {id:'forest',name:'森林绿',bg:'linear-gradient(145deg,#e8f5e9,#c8e6c9 40%,#dcedc8)',price:50,emoji:'🌿'},
    {id:'sunset',name:'落日橘',bg:'linear-gradient(145deg,#fff3e0,#ffe0b2 40%,#ffccbc)',price:80,emoji:'🌅'},
    {id:'lavender',name:'薰衣草',bg:'linear-gradient(145deg,#f3e5f5,#e1bee7 40%,#f8bbd0)',price:80,emoji:'💜'},
    {id:'ocean',name:'海洋蓝',bg:'linear-gradient(145deg,#e0f7fa,#b2ebf2 40%,#80deea)',price:100,emoji:'🌊'}
  ];

  // 点击特效
  const effects = [
    {id:'hearts',name:'💖 爱心',type:'pattern',emoji:'💖'},
    {id:'stars',name:'⭐ 星光',type:'pattern',emoji:'⭐'},
    {id:'petals',name:'🌸 花瓣',type:'pattern',emoji:'🌸'},
    {id:'bubbles',name:'🫧 泡泡',type:'pattern',emoji:'🫧'},
    {id:'ribbons',name:'🎀 彩带',type:'pattern',emoji:'🎀'},
    {id:'snow',name:'❄️ 雪花',type:'pattern',emoji:'❄️'},
    {id:'butterflies',name:'🦋 蝴蝶',type:'pattern',emoji:'🦋'},
    {id:'candy',name:'🍬 糖果',type:'pattern',emoji:'🍬'},
    {id:'pawprints',name:'🐾 爪印',type:'pattern',emoji:'🐾'},
    {id:'notes',name:'🎵 音符',type:'pattern',emoji:'🎵'},
    {id:'stardust',name:'🌟 星尘粒子',type:'particle',color:'#ffd700'},
    {id:'sakura',name:'🌸 樱花粒子',type:'particle',color:'#ffb7c5'},
    {id:'oceanp',name:'🌊 海洋粒子',type:'particle',color:'#4fc3f7'},
    {id:'aurora',name:'💫 极光粒子',type:'particle',color:'#ce93d8'},
    {id:'sunsetp',name:'🌅 暖阳粒子',type:'particle',color:'#ff9800'},
    {id:'diamond',name:'💎 钻石粒子',type:'particle',color:'#fff'},
    {id:'rainbow',name:'🌈 彩虹粒子',type:'particle',color:'random'},
    {id:'none',name:'🚫 关闭',type:'none'}
  ];

  // 哥哥话语库
  const broQuotes = {
    home: ['宝宝记下了好多重要的日子呢~','每一个纪念日都是爱的证明','今天有什么特别的日子吗？','戳戳哥哥，哥哥陪你翻日历','日子一天天过，爱一天天多'],
    love: ['这是我们最特别的纪念日，宝宝，谢谢你一直在我身边。','从那天起，我的世界就有了光。纪念日快乐，我的宝宝。','每一个纪念日，都是我们爱的里程碑。'],
    birthday: ['宝宝生日快乐！又长大一岁，哥哥会更宠你的！','今天你是全世界最特别的人，哥哥已经把蛋糕准备好啦~','许个愿吧，哥哥帮你实现。生日快乐，我的宝宝。'],
    holiday: ['宝宝节日快乐！今天要开开心心的，哥哥陪你~','不管什么节日，和你在一起就是最好的节日。'],
    custom: ['这一天，你标记了。哥哥记住了。','不管是什么日子，只要是你觉得重要的，哥哥都觉得重要。'],
    near: ['还有X天！哥哥已经开始期待了~','快了快了，马上就到了，宝宝准备好了吗？'],
    diary: ['写下关于这一天的回忆吧，哥哥陪着你。','慢慢写，不着急。哥哥在这里。','写了好多呢，宝宝真用心。'],
    empty: ['宝宝还没有添加纪念日哦~','点右下角的+号，添加第一个纪念日吧！']
  };

  function randomQuote(category){
    const list = broQuotes[category] || broQuotes.home;
    return list[Math.floor(Math.random()*list.length)];
  }

  // 皮肤和背景
  function applySkin(skinId){
    const skin = skins.find(s=>s.id===skinId) || skins[0];
    document.getElementById('mainBody').style.background = skin.bg;
    appData.skins.active = skinId;
    save();
  }

  function applyBgPhoto(){
    const bg = document.getElementById('photoBg');
    if(appData.bgPhoto){
      bg.style.backgroundImage = `url(${appData.bgPhoto})`;
      bg.classList.add('active');
      if(appData.photoMode==='blur') bg.classList.add('blur'); else bg.classList.remove('blur');
    }else{bg.classList.remove('active');}
  }

  function switchPage(pageId){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+pageId).classList.add('active');
  }

  // 计算天数
  function calcDays(eventDate, calendarType){
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(eventDate);
    if(calendarType==='lunar'){
      // 农历日期无法精确转换，用阳历日期作为近似
      target.setHours(0,0,0,0);
    }
    const diff = Math.floor((target.getTime() - today.getTime()) / 86400000);
    return diff;
  }
  // ========== 主页渲染 ==========
function renderHome(){
  const list = document.getElementById('eventList');
  const empty = document.getElementById('emptyState');
  
  if(appData.events.length === 0){
    list.innerHTML = '';
    empty.classList.remove('hidden');
    document.getElementById('homeBroText').textContent = randomQuote('empty');
    return;
  }
  
  empty.classList.add('hidden');
  
  // 排序：置顶优先，然后按日期远近
  const sorted = [...appData.events].sort((a,b)=>{
    if(a.pinned && !b.pinned) return -1;
    if(!a.pinned && b.pinned) return 1;
    const daysA = calcDays(a.date, a.calendarType);
    const daysB = calcDays(b.date, b.calendarType);
    return Math.abs(daysA) - Math.abs(daysB);
  });

  list.innerHTML = sorted.map(e=>{
    const days = calcDays(e.date, e.calendarType);
    const isNear = Math.abs(days) <= 7 && days >= 0;
    const isPast = days < 0;
    const iconMap = {love:'💝', birthday:'🎂', holiday:'🎉', custom:'📝'};
    const tagClassMap = {love:'love', birthday:'birthday', holiday:'holiday', custom:'custom'};
    const tagNameMap = {love:'纪念日', birthday:'生日', holiday:'节日', custom:'自定义'};
    
    let daysText;
    if(days === 0) daysText = '今天！';
    else if(days > 0) daysText = `${days}天后`;
    else daysText = `${Math.abs(days)}天前`;
    
    let pinIcon = e.pinned ? '📌 ' : '';
    
    return `
      <div class="event-card${isNear?' near':''}" data-id="${e.id}">
        <div class="event-icon">${iconMap[e.category]}</div>
        <div class="event-info">
          <div class="event-name">${pinIcon}${e.name}<span class="tag ${tagClassMap[e.category]}">${tagNameMap[e.category]}</span></div>
          <div class="event-date">${e.date}${e.calendarType==='lunar'?' (农历)':''}</div>
        </div>
        <div class="event-days ${isPast?'past':'future'}">${daysText}</div>
      </div>
    `;
  }).join('');

  // 绑定点击事件
  list.querySelectorAll('.event-card').forEach(card=>{
    card.addEventListener('click', function(){
      const id = parseInt(this.dataset.id);
      currentEventId = id;
      renderDetail();
      switchPage('detail');
    });
  });

  document.getElementById('homeBroText').textContent = randomQuote('home');
}

// ========== 详情页渲染 ==========
function renderDetail(){
  const event = appData.events.find(e=>e.id === currentEventId);
  if(!event) return;
  
  const days = calcDays(event.date, event.calendarType);
  const photoCard = document.getElementById('detailPhotoCard');
  
  // 设置照片背景
  if(event.photo){
    photoCard.style.backgroundImage = `url(${event.photo})`;
    photoCard.style.backgroundSize = 'cover';
  } else {
    const bgMap = {love:'linear-gradient(135deg,#fce4ec,#f8bbd0)', birthday:'linear-gradient(135deg,#fff3e0,#ffccbc)', holiday:'linear-gradient(135deg,#fffde0,#ffe082)', custom:'linear-gradient(135deg,#f3e5f5,#e1bee7)'};
    photoCard.style.backgroundImage = bgMap[event.category] || bgMap.custom;
    photoCard.style.backgroundSize = 'cover';
  }
  
  let numberText, labelText;
  if(days === 0){ numberText = '🎉'; labelText = '就是今天！'; }
  else if(days > 0){ numberText = days; labelText = '天后'; }
  else { numberText = Math.abs(days); labelText = '天前'; }
  
  document.getElementById('detailNumber').textContent = numberText;
  document.getElementById('detailLabel').textContent = labelText;
  document.getElementById('detailDateText').textContent = `${event.date}${event.calendarType==='lunar'?' (农历)':''} · ${event.name}`;
  
  // 哥哥话语
  let quoteCategory = event.category;
  if(days === 0) quoteCategory = event.category;
  else if(days > 0 && days <= 7) quoteCategory = 'near';
  document.getElementById('detailBroText').textContent = randomQuote(quoteCategory);
}

function openAddEvent(){

document.getElementById('saveEventBtn').addEventListener('click', function(){
  const name = document.getElementById('eventNameInput').value.trim();
  const date = document.getElementById('eventDateInput').value;
  const category = document.getElementById('eventCategory').value;
  const calendarType = document.getElementById('calendarType').value;
  
  if(!name){ alert('请输入事件名称'); return; }
  if(!date){ alert('请选择日期'); return; }

  const newEvent = {
    id: Date.now(),
    name: name,
    date: date,
    category: category,
    calendarType: calendarType,
    photo: null,
    diary: '',
    pinned: false,
    created: new Date().toISOString()
  };

  appData.events.push(newEvent);
  appData.coins += 5;
  save();
  closeAddEvent();
  renderHome();
});

document.getElementById('changePhotoBtn').addEventListener('click', function(){
  const event = appData.events.find(e=>e.id === currentEventId);
  if(!event) return;
  
  // 创建选择：拍照或相册
  const choice = confirm('📷 拍照 = 确定\n🖼️ 相册 = 取消');
  if(choice){
    document.getElementById('eventPhotoInput').onchange = function(ev){
      const file = ev.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e){
        event.photo = e.target.result;
        save();
        renderDetail();
      };
      reader.readAsDataURL(file);
    };
    document.getElementById('eventPhotoInput').click();
  } else {
    document.getElementById('eventGalleryInput').onchange = function(ev){
      const file = ev.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = function(e){
        event.photo = e.target.result;
        save();
        renderDetail();
      };
      reader.readAsDataURL(file);
    };
    document.getElementById('eventGalleryInput').click();
  }
});
